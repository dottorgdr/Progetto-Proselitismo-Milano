<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resoconto Proselitismo FIRST CISL BPER Banca</title>
<style>
:root{--blu:#00528c;--verde:#007a4d;--sfondo:#f2f6f8;--bordo:#c8d5dc}
*{box-sizing:border-box}body{margin:0;padding:24px 12px;background:var(--sfondo);font-family:Arial,Helvetica,sans-serif;color:#17212b}
.container{max-width:760px;margin:auto}.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 26px rgba(0,45,75,.12)}
.header{text-align:center;padding:24px;border-bottom:5px solid var(--verde)}.logo{width:min(100%,430px);height:auto;margin-bottom:18px}
h1{margin:0;color:var(--blu);font-size:clamp(22px,4vw,31px);line-height:1.25}
form{padding:26px 24px 30px}.field{margin-bottom:22px}label{display:block;margin-bottom:8px;color:var(--blu);font-weight:700}
input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--bordo);border-radius:9px;font:inherit;background:#fff}
input,select{min-height:48px}textarea{min-height:100px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(0,82,140,.14)}
.filiale{padding:18px;margin-bottom:20px;border:1px solid var(--bordo);border-left:6px solid var(--verde);border-radius:11px;background:#f9fbfc}
.filiale h2{margin:0 0 16px;color:var(--verde);font-size:18px}.button-wrap{text-align:center;margin-top:28px}
button{width:100%;max-width:320px;min-height:52px;border:0;border-radius:28px;background:var(--blu);color:#fff;font-size:17px;font-weight:700;cursor:pointer}
button:disabled{opacity:.6;cursor:wait}#status{text-align:center;font-weight:700;min-height:24px;margin-top:18px}
.ok{color:#067647}.ko{color:#b42318}.nota{font-size:13px;color:#52606d;margin-top:-8px}
@media(max-width:560px){body{padding:0}.card{border-radius:0;min-height:100vh}.header,form{padding-left:18px;padding-right:18px}}
</style>
</head>
<body>
<main class="container">
<section class="card">
<header class="header">
<img src="LogoBper_Orizzontale.jpeg" class="logo" alt="FIRST CISL BPER Banca">
<h1>RESOCONTO PROSELITISMO FIRST CISL BPER BANCA</h1>
</header>

<form id="reportForm">
<p class="nota">I campi contrassegnati con * sono obbligatori.</p>

<div class="field">
<label for="nomeCognome">NOME E COGNOME *</label>
<input type="text" id="nomeCognome" maxlength="120" required>
</div>

<div class="field">
<label for="dataVisita">DATA VISITA *</label>
<input type="date" id="dataVisita" required>
</div>

<div class="field">
<label for="numeroFiliali">NUMERO FILIALI VISITATE (da 1 a 6) *</label>
<select id="numeroFiliali" required>
<option value="">Seleziona...</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
</select>
</div>

<div id="filialiContainer"></div>

<div class="button-wrap">
<button type="submit" id="submitButton">INVIA</button>
</div>
<p id="status" role="status"></p>
</form>
</section>
</main>

<script>
const WEB_APP_URL = 'INSERISCI_QUI_URL_WEB_APP';

const form=document.getElementById('reportForm');
const numeroFiliali=document.getElementById('numeroFiliali');
const container=document.getElementById('filialiContainer');
const button=document.getElementById('submitButton');
const statusBox=document.getElementById('status');

numeroFiliali.addEventListener('change',()=>{
  container.innerHTML='';
  const n=Number(numeroFiliali.value);
  for(let i=1;i<=n;i++){
    const box=document.createElement('section');
    box.className='filiale';
    box.innerHTML=`
      <h2>FILIALE ${i}</h2>
      <div class="field">
        <label for="nomeFiliale${i}">NOME FILIALE *</label>
        <input type="text" id="nomeFiliale${i}" maxlength="150" required>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="noteFiliale${i}">NOTE</label>
        <textarea id="noteFiliale${i}" maxlength="1500" placeholder="Inserisci eventuali note..."></textarea>
      </div>`;
    container.appendChild(box);
  }
});

form.addEventListener('submit',async e=>{
  e.preventDefault();
  statusBox.textContent=''; statusBox.className='';
  if(!form.reportValidity()) return;

  if(!WEB_APP_URL.startsWith('https://script.google.com/macros/s/')){
    mostra('Inserire nell’HTML l’indirizzo corretto della Web App Google Apps Script.',false);
    return;
  }

  const n=Number(numeroFiliali.value);
  const filiali=[];
  for(let i=1;i<=n;i++){
    filiali.push({
      nomeFiliale:document.getElementById(`nomeFiliale${i}`).value.trim(),
      note:document.getElementById(`noteFiliale${i}`).value.trim()
    });
  }

  const payload={
    nomeCognome:document.getElementById('nomeCognome').value.trim(),
    dataVisita:document.getElementById('dataVisita').value,
    numeroFiliali:n,
    filiali
  };

  button.disabled=true;
  button.textContent='INVIO IN CORSO...';

  try{
    /*
      Google Apps Script non restituisce sempre intestazioni CORS leggibili
      da una pagina ospitata su GitHub Pages. Con no-cors il browser invia
      comunque i dati, ma non tenta di leggere la risposta.
    */
    await fetch(WEB_APP_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)
    });

    mostra('Grazie! Il resoconto è stato inviato.',true);
    form.reset();
    container.innerHTML='';
  }catch(err){
    console.error(err);
    mostra('Non è stato possibile inviare i dati. Controlla la connessione e riprova.',false);
  }finally{
    button.disabled=false;
    button.textContent='INVIA';
  }
});

function mostra(testo,ok){
  statusBox.textContent=testo;
  statusBox.className=ok?'ok':'ko';
}
</script>
</body>
</html>
